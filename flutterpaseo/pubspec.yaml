name: paseo
description: mcoding Flutter client for pairing and controlling remote AI coding sessions.
publish_to: 'none'
version: 0.4.2+8

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management & routin
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1

  # Networking
  web_socket_channel: ^3.0.2
  http: ^1.3.0

  # Data modeling & serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local storage (AsyncStorage equivalent)
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  equatable: ^2.0.7
  package_info_plus: ^8.1.2

  # UI
  flutter_markdown: ^0.7.7
  xterm: ^4.0.0
  mobile_scanner: 6.0.11

  record: ^6.2.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5

  # Audio
  audioplayers: ^6.1.0

  # App update / install APK
  open_filex: ^4.6.0

  # Logging
  logger: ^2.5.0
  diff_match_patch: ^0.4.1
  highlight: ^0.7.0
  pinenacl: ^0.6.0
  in_app_purchase: 3.2.1
  in_app_purchase_android: 0.4.0
  in_app_purchase_storekit: 0.3.21
  in_app_purchase_platform_interface: 1.4.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  go_router_builder: ^2.8.2
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0a0e1a"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/sounds/
